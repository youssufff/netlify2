<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">YouTube</div>

    <div class="search-box">
      <input type="text" placeholder="Qidirish...">
      <button>Search</button>
    </div>

    <div class="profile"></div>
  </div>

  <div class="sidebar">
    <ul>
      <li>Home</li>
      <li>Trending</li>
      <li>Gaming</li>
      <li>Music</li>
      <li>Subscriptions</li>
    </ul>
  </div>

  <div class="main">

    <div class="video-card">
      <img src="https://i0.wp.com/weqtechnologies.com/wp-content/uploads/2025/05/Frontend-Vs-backend-banner.png?fit=1024%2C576&ssl=1">
      <div class="video-info">
        <h3>Frontend darslari</h3>
        <p>1M views • 2 days ago</p>
      </div>
    </div>

    <div class="video-card">
      <img src="https://i.ytimg.com/vi/VERfm7Yldgk/maxresdefault.jpg">
      <div class="video-info">
        <h3>Gaming montage</h3>
        <p>500K views • 5 days ago</p>
      </div>
    </div>

    <div class="video-card">
      <img src="https://m.media-amazon.com/images/M/MV5BNTQ3NTFiYmQtMjE5Ny00MjNlLWIxMGYtNDU3MzkxMWNjNTY1XkEyXkFqcGc@._V1_.jpg">

        <h3>Funny moments</h3>
        <p>250K views • 1 week ago</p>
      </div>
    </div>

  </div>

</body>
</html>
